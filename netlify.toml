[build]
  command = "npm install && npm run build"
  functions = "netlify/functions"
  publish = "frontend/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_BASE_URL = "https://sporty-rabbi-backend.railway.app/api"
  VITE_WS_URL = "wss://sporty-rabbi-backend.railway.app"
